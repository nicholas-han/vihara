services:
  postgres:
    image: postgres:16
    container_name: vihara-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vihara
      POSTGRES_PASSWORD: vihara_dev
      POSTGRES_DB: vihara
    ports:
      - "5432:5432"
    volumes:
      - vihara_postgres_data:/var/lib/postgresql/data
      - ../../instrument_manager/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ../../instrument_manager/seed_v0.sql:/docker-entrypoint-initdb.d/002_seed_v0.sql:ro
      - ../../instrument_manager/seed_initial_universe.sql:/docker-entrypoint-initdb.d/003_seed_initial_universe.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vihara -d vihara"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vihara_postgres_data:
